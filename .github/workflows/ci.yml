name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  ENCRYPTION_KEY: "test-encryption-key-for-ci"

jobs:
  # ============================================================
  # STAGE 1: Quality Gates (parallel across all OS/arch combos)
  # ============================================================

  lint:
    name: Lint (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-15-intel
          - macos-latest
          - windows-latest
          - windows-11-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm run lint

  type-check:
    name: Type Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-15-intel
          - macos-latest
          - windows-latest
          - windows-11-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: pnpm exec tsc --noEmit

  security-audit:
    name: Security Audit (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-15-intel
          - macos-latest
          - windows-latest
          - windows-11-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high
        continue-on-error: true

      - name: Audit all dependencies (critical only)
        run: pnpm audit --audit-level critical

  # ============================================================
  # STAGE 2: Build (depends on Stage 1, all OS/arch combos)
  # ============================================================

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    needs: [lint, type-check, security-audit]
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-15-intel
          - macos-latest
          - windows-latest
          - windows-11-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**/*') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nextjs-${{ runner.os }}-${{ runner.arch }}-

      - name: Build
        run: pnpm run build

      - name: Report bundle size
        shell: bash
        run: |
          echo "## Bundle Size (${{ matrix.os }})" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          du -sh .next/ 2>/dev/null | sed 's/\t/ /' >> $GITHUB_STEP_SUMMARY || echo "N/A" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d ".next/static" ]; then
            find .next/static -type f | wc -l | xargs -I{} echo "{} files in .next/static" >> $GITHUB_STEP_SUMMARY
            du -sh .next/static/ | sed 's/\t/ /' >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            .next/
            !.next/cache/
          retention-days: 3

  # ============================================================
  # STAGE 3: E2E Tests (depends on Stage 1, OS × browser matrix)
  # ============================================================

  e2e:
    name: E2E ${{ matrix.browser }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    needs: [lint, type-check, security-audit]
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-15-intel
          - macos-latest
          - windows-latest
          - windows-11-arm
        browser:
          - chromium
          - firefox
          - webkit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ms-playwright
            ~/Library/Caches/ms-playwright
            ~/AppData/Local/ms-playwright
          key: playwright-${{ runner.os }}-${{ runner.arch }}-${{ matrix.browser }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browser
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps ${{ matrix.browser }}

      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps ${{ matrix.browser }}
        continue-on-error: true

      - name: Run E2E tests
        run: pnpm exec playwright test --project=${{ matrix.browser }}
        env:
          CI: "true"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}-${{ matrix.os }}
          path: playwright-report/
          retention-days: 7

      - name: Upload failure screenshots & traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser }}-${{ matrix.os }}
          path: test-results/
          retention-days: 7

  # ============================================================
  # STAGE 4: Summary Report (runs after build + E2E, always)
  # ============================================================

  report:
    name: CI Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build, e2e]
    if: always()
    steps:
      - name: Download Playwright reports
        uses: actions/download-artifact@v4
        with:
          pattern: playwright-report-*
          path: all-reports/
          merge-multiple: false
        continue-on-error: true

      - name: Download failure artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          path: all-test-results/
          merge-multiple: false
        continue-on-error: true

      - name: Generate summary
        run: |
          echo "## CI Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY

          status_icon() {
            case "$1" in
              success) echo ":white_check_mark:" ;;
              failure) echo ":x:" ;;
              cancelled) echo ":warning:" ;;
              skipped) echo ":next_track_button:" ;;
              *) echo ":grey_question:" ;;
            esac
          }

          echo "| Lint | $(status_icon ${{ needs.build.result }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Type Check | $(status_icon ${{ needs.build.result }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Audit | $(status_icon ${{ needs.build.result }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Build (all platforms) | $(status_icon ${{ needs.build.result }}) ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E (all browsers × platforms) | $(status_icon ${{ needs.e2e.result }}) ${{ needs.e2e.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Platform Matrix" >> $GITHUB_STEP_SUMMARY
          echo "- Linux x64 (ubuntu-latest)" >> $GITHUB_STEP_SUMMARY
          echo "- Linux ARM64 (ubuntu-24.04-arm)" >> $GITHUB_STEP_SUMMARY
          echo "- macOS x64 / Intel (macos-15-latest)" >> $GITHUB_STEP_SUMMARY
          echo "- macOS ARM64 / M-series (macos-latest)" >> $GITHUB_STEP_SUMMARY
          echo "- Windows x64 (windows-latest)" >> $GITHUB_STEP_SUMMARY
          echo "- Windows ARM64 (windows-11-arm)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Browser Matrix" >> $GITHUB_STEP_SUMMARY
          echo "Chromium, Firefox, WebKit × 6 platforms = 18 E2E jobs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -d "all-test-results" ] && [ "$(ls -A all-test-results 2>/dev/null)" ]; then
            echo ":warning: **Some tests failed.** Download test-results artifacts for screenshots and traces." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;

            const buildResult = '${{ needs.build.result }}';
            const e2eResult = '${{ needs.e2e.result }}';

            const icon = (r) => {
              if (r === 'success') return ':white_check_mark:';
              if (r === 'failure') return ':x:';
              if (r === 'cancelled') return ':warning:';
              return ':grey_question:';
            };

            const platforms = [
              'ubuntu-latest', 'ubuntu-24.04-arm',
              'macos-15-latest', 'macos-latest',
              'windows-latest', 'windows-11-arm'
            ];

            const body = [
              '## CI Results',
              '',
              '| Stage | Status |',
              '|-------|--------|',
              `| Build (6 platforms) | ${icon(buildResult)} ${buildResult} |`,
              `| E2E (18 jobs: 3 browsers × 6 platforms) | ${icon(e2eResult)} ${e2eResult} |`,
              '',
              '**Platforms:** Linux x64, Linux ARM64, macOS Intel, macOS ARM64, Windows x64, Windows ARM64',
              '**Browsers:** Chromium, Firefox, WebKit',
              '',
              `[View full run](${runUrl})`,
              '',
              `<sub>Updated: ${new Date().toISOString()}</sub>`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber,
            });

            const existing = comments.find(
              (c) => c.user.type === 'Bot' && c.body.includes('## CI Results')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber, body,
              });
            }
